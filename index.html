<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PsiqueSim - AI Training for Psychologists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'primary-light': '#A2C4C9',
              'primary-dark': '#2C3E50',
              'accent': '#E67E22',
              'background-light': '#F8F9FA',
            },
            fontFamily: {
              sans: ['Lato', 'sans-serif'],
              heading: ['Montserrat', 'sans-serif'],
            },
            animation: {
              'fade-in-up': 'fade-in-up 0.3s ease-out forwards',
              'loading-bar': 'loading-bar 1.5s linear infinite',
            },
            keyframes: {
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'loading-bar': {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
            },
          },
        },
      }
    </script>
  <script type="importmap">

    "react/": "https://aistudiocdn.com/react@^19.1.1/",

    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.20.0"
  }
}
</script>
